<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>فروق - متشابهات القرآن الكريم</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#064e3b">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        amiri: ['Amiri', 'serif'],
                        cairo: ['Cairo', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 dark:bg-slate-900 transition-colors duration-300">
    <div id="root">
        <!-- Professional Loading State -->
        <div class="w-full min-h-screen flex flex-col items-center justify-center bg-slate-50">
            <div class="relative w-24 h-24 mb-6">
                <div class="absolute inset-0 border-4 border-emerald-100 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-emerald-600 rounded-full border-t-transparent animate-spin"></div>
            </div>
            <h2 class="text-2xl font-black text-emerald-900 font-cairo tracking-tight">فُروق</h2>
            <p class="text-slate-500 mt-2 font-cairo">جاري تهيئة دليلك البصري لمتشابهات القرآن...</p>
        </div>
    </div>

    <!-- Standalone Scripts -->
    <script src="js/engine.js"></script>
    <script type="text/babel" src="js/app.jsx"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
